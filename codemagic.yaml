workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - app_store_credentials # Configure these in Codemagic UI: issuer_id, key_id, private_key
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.bs7671.fieldtoolkit"
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Create Native Project & Fix Dependencies
        script: |
          set -e
          if [ ! -d "dist" ]; then
            echo "ERROR: 'dist' directory not found."
            exit 1
          fi
          rm -rf ios
          echo "{\"appId\": \"$APP_ID\", \"appName\": \"App\", \"webDir\": \"dist\"}" > capacitor.config.json
          npx cap add ios || true
          # Force deployment target to 15.0 for compatibility
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '15.0'/g" ios/App/Podfile
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' {} +
          
          # Fix Export Compliance (skip manual encryption question)
          PLIST="ios/App/App/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          fi
          
          cd ios/App && pod repo update && cd ../..
          npx cap sync ios
      - name: Set up Signing
        script: |
          set -e
          pip3 install --upgrade codemagic-cli-tools
          hash -r
          keychain initialize
          # Format the private key correctly (handling newlines)
          export APP_STORE_CONNECT_PRIVATE_KEY=$(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | sed 's/\\n/\n/g')
          if [ -z "$APP_STORE_CONNECT_KEY_ID" ] && [ -n "$APP_STORE_CONNECT_KEY_IDENTIFIER" ]; then
            export APP_STORE_CONNECT_KEY_ID="$APP_STORE_CONNECT_KEY_IDENTIFIER"
          fi
          echo "APP_STORE_CONNECT_KEY_ID=$APP_STORE_CONNECT_KEY_ID" >> $CM_ENV
          
          echo "--- Generating CSR ---"
          openssl genrsa -out /tmp/key.pem 2048
          openssl req -new -key /tmp/key.pem -out /tmp/cert.csr -subj "/CN=Apple Distribution: BS7671/O=FieldToolkit"
          
          echo "--- Syncing Signing Assets via API ---"
          python3 - <<EOF
          import os, sys, json, time, jwt, requests, base64
          def portal_sync():
              try:
                  issuer_id = os.environ.get('APP_STORE_CONNECT_ISSUER_ID')
                  key_id = os.environ.get('APP_STORE_CONNECT_KEY_ID')
                  raw_key = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY', '')
                  private_key = raw_key.replace('\\\\n', '\n').replace('\\n', '\n')
                  
                  # Generate JWT
                  token = jwt.encode({'iss': issuer_id, 'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'}, private_key, algorithm='ES256', headers={'alg': 'ES256', 'kid': str(key_id), 'typ': 'JWT'})
                  if isinstance(token, bytes): token = token.decode('utf-8')
                  headers = {"Authorization": f"Bearer {token}"}
                  
                  # 1. Cleanup old certificates (Apple has limits)
                  resp = requests.get("https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=DISTRIBUTION&limit=100", headers=headers)
                  if resp.status_code == 200:
                      for cert in resp.json().get('data', []):
                          requests.delete(f"https://api.appstoreconnect.apple.com/v1/certificates/{cert['id']}", headers=headers)
                  time.sleep(3)
                  
                  # 2. Create new Distribution Certificate
                  with open('/tmp/cert.csr', 'r') as f:
                      csr_content = "".join([line.strip() for line in f.readlines() if "CERTIFICATE REQUEST" not in line])
                  res = requests.post("https://api.appstoreconnect.apple.com/v1/certificates", headers=headers, json={"data": {"type": "certificates", "attributes": {"certificateType": "DISTRIBUTION", "csrContent": csr_content}}})
                  if res.status_code != 201:
                      print(f"Cert Error: {res.text}")
                      sys.exit(1)
                  cid = res.json()['data']['id']
                  content = res.json()['data']['attributes']['certificateContent']
                  with open('/tmp/cert.cer', 'wb') as f: f.write(base64.b64decode(content))
                  
                  # 3. Create/Sync Provisioning Profile
                  app_id = os.environ.get('APP_ID')
                  bid_resp = requests.get(f"https://api.appstoreconnect.apple.com/v1/bundleIds?filter[identifier]={app_id}", headers=headers)
                  if not bid_resp.json().get('data'):
                      print(f"Error: Bundle ID {app_id} not found")
                      sys.exit(1)
                  bid = bid_resp.json()['data'][0]['id']
                  
                  pn = "FieldToolkit_Managed_Dist"
                  # Cleanup existing profile
                  r = requests.get(f"https://api.appstoreconnect.apple.com/v1/profiles?filter[name]={pn}", headers=headers)
                  if r.status_code == 200:
                      for p in r.json().get('data', []):
                          requests.delete(f"https://api.appstoreconnect.apple.com/v1/profiles/{p['id']}", headers=headers)
                  time.sleep(3)
                  
                  # Create new profile
                  res = requests.post("https://api.appstoreconnect.apple.com/v1/profiles", headers=headers, json={
                      "data": {
                          "type": "profiles",
                          "attributes": {"name": pn, "profileType": "IOS_APP_STORE"},
                          "relationships": {
                              "bundleId": {"data": {"type": "bundleIds", "id": bid}},
                              "certificates": {"data": [{"type": "certificates", "id": cid}]}
                          }
                      }
                  })
                  if res.status_code != 201:
                      print(f"Profile Error: {res.text}")
                      sys.exit(1)
                  pid = res.json()['data']['id']
                  
                  # Download profile
                  p_res = requests.get(f"https://api.appstoreconnect.apple.com/v1/profiles/{pid}", headers=headers)
                  p_content = p_res.json()['data']['attributes']['profileContent']
                  pdir = os.path.expanduser("~/Library/MobileDevice/Provisioning Profiles")
                  os.makedirs(pdir, exist_ok=True)
                  with open(os.path.join(pdir, f"{pid}.mobileprovision"), 'wb') as f:
                      f.write(base64.b64decode(p_content))
                  with open('/tmp/profile.id', 'w') as f: f.write(pid)
                  
                  # 4. Sync App Metadata (Beta Review Info)
                  print("Syncing App Beta Metadata...")
                  import traceback
                  try:
                      ad_resp = requests.get(f"https://api.appstoreconnect.apple.com/v1/apps?filter[bundleId]={app_id}", headers=headers)
                      print(f"App Lookup Status: {ad_resp.status_code}")
                      ad = ad_resp.json()
                      if ad.get('data'):
                          aid = ad['data'][0]['id']
                          print(f"App ID: {aid}")
                          
                          # Beta App Review Detail
                          print("Fetching Beta App Review Detail...")
                          rd_resp = requests.get(f"https://api.appstoreconnect.apple.com/v1/apps/{aid}/betaAppReviewDetail", headers=headers)
                          print(f"Review Detail Status: {rd_resp.status_code}")
                          rd = rd_resp.json()
                          review_attr = {"firstName": "Tommy", "lastName": "Holm", "phoneNumber": "+45 12 34 56 78", "email": "tommyholm97@gmail.com"}
                          
                          if rd.get('data'):
                              rid = rd['data']['id']
                              print(f"Patching Review Detail {rid}...")
                              p_res = requests.patch(f"https://api.appstoreconnect.apple.com/v1/betaAppReviewDetails/{rid}", headers=headers, json={"data": {"id": rid, "type": "betaAppReviewDetails", "attributes": review_attr}})
                              print(f"Patch Status: {p_res.status_code}")
                          else:
                              print("Review detail not found - skipping patch.")
                          
                          # Beta Localization (Feedback Email)
                          print("Fetching Beta Localizations...")
                          locs_resp = requests.get(f"https://api.appstoreconnect.apple.com/v1/apps/{aid}/betaAppLocalizations", headers=headers)
                          print(f"Localization Lookup Status: {locs_resp.status_code}")
                          locs = locs_resp.json()
                          if locs.get('data'):
                              for loc in locs['data']:
                                  lid = loc['id']
                                  print(f"Patching Localization {lid} feedback email...")
                                  p_res = requests.patch(f"https://api.appstoreconnect.apple.com/v1/betaAppLocalizations/{lid}", headers=headers, json={"data": {"id": lid, "type": "betaAppLocalizations", "attributes": {"feedbackEmail": "tommyholm97@gmail.com"}}})
                                  print(f"Patch Status: {p_res.status_code}")
                          else:
                              print("No localizations found - creating default (en-US)...")
                              c_res = requests.post("https://api.appstoreconnect.apple.com/v1/betaAppLocalizations", headers=headers, json={
                                  "data": {
                                      "type": "betaAppLocalizations",
                                      "attributes": {"locale": "en-US", "feedbackEmail": "tommyholm97@gmail.com"},
                                      "relationships": {"app": {"data": {"type": "apps", "id": aid}}}
                                  }
                              })
                              print(f"Create Status: {c_res.status_code}")
                      else:
                          print(f"Error: App with bundle ID {app_id} not found in account.")
                  except Exception as e:
                      print(f"Metadata Sync Error: {e}")
                      traceback.print_exc()
                  
                  print("Sync completed.")
              except Exception as e:
                  print(f"Fatal Python Error: {e}")
                  sys.exit(1)
          portal_sync()
          EOF
          
          # 4. Import to Keychain
          openssl x509 -inform DER -in /tmp/cert.cer -out /tmp/cert.pem
          openssl pkcs12 -export -out /tmp/cert.p12 -inkey /tmp/key.pem -in /tmp/cert.pem -password pass:codemagic -name "Apple Distribution" -legacy
          KC_PATH=$(ls ~/Library/codemagic-cli-tools/keychains/*.keychain-db | head -1)
          security import /tmp/cert.p12 -k "$KC_PATH" -P "codemagic" -A -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "codemagic" "$KC_PATH" > /dev/null 2>&1 || true
          
          # 5. Export variables for next steps
          PROFILE_ID=$(cat /tmp/profile.id)
          security cms -D -i "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_ID}.mobileprovision" > /tmp/profile.plist
          export TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /tmp/profile.plist)
          export PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /tmp/profile.plist)
          export PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist)
          echo "TEAM_ID=$TEAM_ID" >> $CM_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $CM_ENV
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV
          
          # Patch project
          PBXPROJ=$(find ios/App/App.xcodeproj -name "project.pbxproj")
          sed -i '' "s/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = $TEAM_ID;/g" "$PBXPROJ"
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = $APP_ID;/g" "$PBXPROJ"
          sed -i '' "s/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g" "$PBXPROJ"
          xcode-project use-profiles
      - name: Increment Build Number
        script: |
          PBXPROJ=$(find ios/App/App.xcodeproj -name "project.pbxproj")
          echo "--- Setting Build Number to $BUILD_NUMBER ---"
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9.]*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" "$PBXPROJ"
      - name: Build iOS app
        script: |
          # Use local ExportOptions.plist for precise control
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict><key>$APP_ID</key><string>$PROFILE_UUID</string></dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          EOF
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist ExportOptions.plist \
            --archive-flags "DEVELOPMENT_TEAM=$TEAM_ID PROVISIONING_PROFILE=$PROFILE_UUID PROVISIONING_PROFILE_SPECIFIER=\"$PROFILE_NAME\" CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY=\"Apple Distribution\""
      - name: Upload to TestFlight
        script: |
          echo "--- Submitting to App Store Connect ---"
          # Wait for metadata sync to propagate
          sleep 10
          # Manually upload using CLI to keep keys hidden from YAML validation
          APP_STORE_CONNECT_BIN=$(dirname $(which python3))/app-store-connect
          # Re-format private key and key ID for CLI
          export APP_STORE_CONNECT_PRIVATE_KEY=$(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | sed 's/\\n/\n/g')
          if [ -z "$APP_STORE_CONNECT_KEY_ID" ] && [ -n "$APP_STORE_CONNECT_KEY_IDENTIFIER" ]; then
            export APP_STORE_CONNECT_KEY_ID="$APP_STORE_CONNECT_KEY_IDENTIFIER"
          fi
          
          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No IPA found to upload."
            exit 1
          fi
          
          $APP_STORE_CONNECT_BIN publish \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --path "$IPA_PATH" \
            --testflight
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tommyholm97@gmail.com
