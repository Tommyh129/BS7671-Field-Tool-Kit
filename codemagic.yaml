workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - app_store_credentials 
      vars:
        TEAM_ID: "G5937UH83P" # Your verified Team ID from the logs
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.bs7671.fieldtoolkit"
        node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Create Native Project & Fix Dependencies
        script: |
          # 1. Start fresh
          rm -rf ios
          echo "{\"appId\": \"$APP_ID\", \"appName\": \"App\", \"webDir\": \"dist\"}" > capacitor.config.json
          
          # 2. Add ios platform and fix version for capacitor-plugin-purchase (must be 15.0)
          npx cap add ios || true
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/g" ios/App/Podfile
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '15.0'/g" ios/App/Podfile
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' {} +
          
          npx cap sync ios
      - name: Set up Signing
        script: |
          # 1. Initialize a completely fresh Keychain
          keychain initialize
          
          # 2. THE MANUAL HANDSHAKE (The Fix)
          # We generate our own Private Key and CSR using OpenSSL.
          # This bypasses the 'Cannot save' error by managing the key ourselves.
          echo "--- Generating Manual Signing Key ---"
          openssl genrsa -out local_signing_key.key 2048
          openssl req -new -key local_signing_key.key -out request.csr -subj "/CN=Codemagic Signing"
          
          # 3. UPLOAD AND CREATE CERTIFICATE
          # We explicitly feed our manual key to the Apple API.
          echo "--- Creating Certificate at Apple ---"
          # Using $(pwd) to ensure absolute path
          KEY_PATH=$(pwd)/local_signing_key.key
          app-store-connect certificates create \
            --type DISTRIBUTION \
            --certificate-key "$KEY_PATH" \
            --save || echo "Certificate slot full or token invalid. Check Agreements!"

          # 4. FETCH SIGNING FILES
          # Now that we have a 'local' key that matches an Apple cert, fetch will succeed.
          echo "--- Fetching Signing Files ---"
          app-store-connect fetch-signing-files "$APP_ID" --type IOS_APP_STORE --create
          
          # 5. Extract Profile Details
          PROFILE_PATH=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name "*.mobileprovision" | head -1)
          if [ -z "$PROFILE_PATH" ]; then
             echo "ERROR: Fetch failed. This usually means you have unaccepted terms at developer.apple.com."
             exit 1
          fi

          export PROFILE_NAME=$(grep -aA1 "Name" "$PROFILE_PATH" -A1 | grep "<string>" | head -1 | sed -e 's/<string>//' -e 's/<\/string>//' | xargs)
          export PROFILE_UUID=$(grep -aA1 "UUID" "$PROFILE_PATH" -A1 | grep "<string>" | head -1 | sed -e 's/<string>//' -e 's/<\/string>//' | xargs)
          
          echo "PROFILE_NAME=$PROFILE_NAME" >> $CM_ENV
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV
          
          # 6. Apply manual signing configuration
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' "s/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g" {} +
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "DEVELOPMENT_TEAM=$TEAM_ID PROVISIONING_PROFILE=$PROFILE_UUID PROVISIONING_PROFILE_SPECIFIER=\"$PROFILE_NAME\" CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY=\"Apple Distribution\""
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tommyholm97@gmail.com
