workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - app_store_credentials # Set these variables in the Codemagic UI
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.bs7671.fieldtoolkit"
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Create Native Project & Fix Dependencies
        script: |
          set -e
          if [ ! -d "dist" ]; then
            echo "ERROR: 'dist' directory not found. Did the web build fail?"
            exit 1
          fi
          rm -rf ios
          echo "{\"appId\": \"$APP_ID\", \"appName\": \"App\", \"webDir\": \"dist\"}" > capacitor.config.json
          npx cap add ios || true
          if [ ! -d "ios" ]; then
            echo "ERROR: ios directory was not created."
            exit 1
          fi
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/g" ios/App/Podfile
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '15.0'/g" ios/App/Podfile
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' {} +
          cd ios/App && pod repo update && cd ../..
          MAX_RETRIES=3
          COUNT=0
          SUCCESS=false
          while [ $COUNT -lt $MAX_RETRIES ]; do
            COUNT=$((COUNT+1))
            echo "Attempting Capacitor Sync (Attempt $COUNT of $MAX_RETRIES)..."
            if npx cap sync ios; then
              SUCCESS=true
              break
            else
              echo "Sync failed. Waiting 15 seconds before retry..."
              sleep 15
            fi
          done
          if [ "$SUCCESS" = false ]; then
            echo "ERROR: Capacitor sync failed after $MAX_RETRIES attempts."
            exit 1
          fi
      - name: Set up Signing
        script: |
          set -e
          # 1. UPGRADE & PATH SETUP
          echo "--- Upgrading Codemagic CLI Tools ---"
          pip3 install --upgrade codemagic-cli-tools
          hash -r
          APP_STORE_CONNECT_BIN=$(dirname $(which python3))/app-store-connect
          keychain initialize
          
          # 2. AUTH & ENV VERIFICATION
          echo "--- Verifying Environment Variables ---"
          export APP_STORE_CONNECT_PRIVATE_KEY=$(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | sed 's/\\n/\n/g')
          
          if [ -z "$APP_STORE_CONNECT_KEY_ID" ] && [ -n "$APP_STORE_CONNECT_KEY_IDENTIFIER" ]; then
            export APP_STORE_CONNECT_KEY_ID="$APP_STORE_CONNECT_KEY_IDENTIFIER"
          fi
          
          MISSING_VARS=0
          for var in APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_PRIVATE_KEY; do
            if [ -z "${!var}" ]; then
              echo "ERROR: Environment variable $var is missing."
              MISSING_VARS=1
            fi
          done
          
          if [ $MISSING_VARS -eq 1 ]; then
            echo "CRITICAL: App Store Connect credentials are missing."
            exit 1
          fi
          
          # 3. CONSOLIDATED PORTAL MANAGEMENT (Python)
          echo "--- Generating CSR ---"
          openssl genrsa -out /tmp/key.pem 2048
          openssl req -new -key /tmp/key.pem -out /tmp/cert.csr -subj "/CN=Apple Distribution: BS7671/O=FieldToolkit"
          
          echo "--- Managing Certificates via API ---"
          python3 - <<EOF
          import os, sys, json, time, jwt, requests, base64
          
          def portal_sync():
              try:
                  issuer_id = os.environ.get('APP_STORE_CONNECT_ISSUER_ID')
                  key_id = os.environ.get('APP_STORE_CONNECT_KEY_ID')
                  raw_key = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY', '')
                  private_key = raw_key.replace('\\\\n', '\n').replace('\\n', '\n')
                  
                  if not issuer_id or not key_id or not private_key:
                      print("ERROR: Missing credentials")
                      sys.exit(1)
                      
                  header = {'alg': 'ES256', 'kid': str(key_id), 'typ': 'JWT'}
                  payload = {'iss': issuer_id, 'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'}
                  token = jwt.encode(payload, private_key, algorithm='ES256', headers=header)
                  if isinstance(token, bytes):
                      token = token.decode('utf-8')
                  
                  headers = {"Authorization": f"Bearer {token}"}
                  
                  # Cleanup
                  print("Cleaning up old certificates...")
                  resp = requests.get("https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=DISTRIBUTION&limit=100", headers=headers)
                  if resp.status_code == 200:
                      for cert in resp.json().get('data', []):
                          cid = cert['id']
                          print(f"Deleting cert: {cid}")
                          requests.delete(f"https://api.appstoreconnect.apple.com/v1/certificates/{cid}", headers=headers)
                  
                  time.sleep(3)
                  
                  # Create Certificate
                  print("Creating fresh Distribution Certificate...")
                  with open('/tmp/cert.csr', 'r') as f:
                      csr_content = "".join([line.strip() for line in f.readlines() if "CERTIFICATE REQUEST" not in line])
                  
                  data = {"data": {"type": "certificates", "attributes": {"certificateType": "DISTRIBUTION", "csrContent": csr_content}}}
                  resp = requests.post("https://api.appstoreconnect.apple.com/v1/certificates", headers=headers, json=data)
                  
                  if resp.status_code != 201:
                      print(f"Certificate Creation Error ({resp.status_code}): {resp.text}")
                      sys.exit(1)
                      
                  res = resp.json()
                  cid = res['data']['id']
                  content = res['data']['attributes']['certificateContent']
                  with open('/tmp/cert.cer', 'wb') as f: f.write(base64.b64decode(content))
                  
                  # Provisioning Profile
                  print("Syncing Provisioning Profile...")
                  app_id = os.environ.get('APP_ID')
                  resp = requests.get(f"https://api.appstoreconnect.apple.com/v1/bundleIds?filter[identifier]={app_id}", headers=headers)
                  if resp.status_code != 200 or not resp.json().get('data'):
                      print(f"ERROR: Bundle ID {app_id} not found ({resp.status_code}): {resp.text}")
                      sys.exit(1)
                  bid = resp.json()['data'][0]['id']
                  
                  profile_name = "FieldToolkit_Managed_Dist"
                  print(f"Pre-cleaning profiles: {profile_name}")
                  # Delete by Name
                  r = requests.get(f"https://api.appstoreconnect.apple.com/v1/profiles?filter[name]={profile_name}&limit=10", headers=headers)
                  if r.status_code == 200:
                      for p in r.json().get('data', []):
                          requests.delete(f"https://api.appstoreconnect.apple.com/v1/profiles/{p['id']}", headers=headers)
                  # Delete by Bundle ID
                  r = requests.get(f"https://api.appstoreconnect.apple.com/v1/profiles?filter[bundleId]={bid}&filter[profileType]=IOS_APP_STORE&limit=10", headers=headers)
                  if r.status_code == 200:
                      for p in r.json().get('data', []):
                          requests.delete(f"https://api.appstoreconnect.apple.com/v1/profiles/{p['id']}", headers=headers)

                  time.sleep(3)
                  
                  print("Creating fresh provisioning profile...")
                  data = {
                      "data": {
                          "type": "profiles",
                          "attributes": {"name": profile_name, "profileType": "IOS_APP_STORE"},
                          "relationships": {
                              "bundleId": {"data": {"type": "bundleIds", "id": bid}},
                              "certificates": {"data": [{"type": "certificates", "id": cid}]}
                          }
                      }
                  }
                  resp = requests.post("https://api.appstoreconnect.apple.com/v1/profiles", headers=headers, json=data)
                  if resp.status_code != 201:
                      print(f"Profile Creation Error ({resp.status_code}): {resp.text}")
                      sys.exit(1)
                  profile_id = resp.json()['data']['id']
                  
                  # Download
                  resp = requests.get(f"https://api.appstoreconnect.apple.com/v1/profiles/{profile_id}", headers=headers)
                  if resp.status_code != 200:
                      print(f"Profile Download Error ({resp.status_code}): {resp.text}")
                      sys.exit(1)
                  
                  profile_content = resp.json()['data']['attributes']['profileContent']
                  profiles_dir = os.path.expanduser("~/Library/MobileDevice/Provisioning Profiles")
                  os.makedirs(profiles_dir, exist_ok=True)
                  with open(os.path.join(profiles_dir, f"{profile_id}.mobileprovision"), 'wb') as f:
                      f.write(base64.b64decode(profile_content))
                  
                  with open('/tmp/profile.id', 'w') as f: f.write(profile_id)
                  print("Successfully synced signing assets.")
                  
              except Exception as e:
                  print(f"Fatal Exception: {str(e)}")
                  import traceback
                  traceback.print_exc()
                  sys.exit(1)
          
          portal_sync()
          EOF
          
          # 4. KEYCHAIN IMPORT
          echo "--- Packaging & Importing P12 ---"
          openssl x509 -inform DER -in /tmp/cert.cer -out /tmp/cert.pem
          openssl pkcs12 -export -out /tmp/cert.p12 -inkey /tmp/key.pem -in /tmp/cert.pem -password pass:codemagic -name "Apple Distribution" -legacy || \
          openssl pkcs12 -export -out /tmp/cert.p12 -inkey /tmp/key.pem -in /tmp/cert.pem -password pass:codemagic -name "Apple Distribution"
          
          KC_PATH=$(ls ~/Library/codemagic-cli-tools/keychains/*.keychain-db | head -1)
          security import /tmp/cert.p12 -k "$KC_PATH" -P "codemagic" -A -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "codemagic" "$KC_PATH" > /dev/null 2>&1 || true
          
          # 5. SYNC COMPLETED IN PYTHON (Bypass CLI)
          echo "--- Provisioning Profile Synced via API ---"
          
          # 6. EXTRACT SIGNING DETAILS
          PROFILE_ID=$(cat /tmp/profile.id)
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_ID}.mobileprovision"
          if [ ! -f "$PROFILE_PATH" ]; then
             echo "ERROR: Provisioning profile not found at $PROFILE_PATH"
             exit 1
          fi
          
          # Use more robust XML extraction for provisioning profiles
          export TEAM_ID=$(grep -aA1 "TeamIdentifier" "$PROFILE_PATH" | grep -o "<string>[^<]*" | sed 's/<string>//' | head -1 | xargs)
          export PROFILE_NAME=$(grep -aA1 "Name" "$PROFILE_PATH" | grep -o "<string>[^<]*" | sed 's/<string>//' | head -1 | xargs)
          export PROFILE_UUID=$(grep -aA1 "UUID" "$PROFILE_PATH" | grep -o "<string>[^<]*" | sed 's/<string>//' | head -1 | xargs)
          
          if [ -z "$TEAM_ID" ] || [ -z "$PROFILE_UUID" ]; then
             echo "ERROR: Could not extract signing details from profile."
             exit 1
          fi
          
          echo "TEAM_ID=$TEAM_ID" >> $CM_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $CM_ENV
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV
          
          echo "--- Finalizing Project Configuration ---"
          PBXPROJ=$(find ios/App/App.xcodeproj -name "project.pbxproj")
          sed -i '' "s/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = $TEAM_ID;/g" "$PBXPROJ"
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = $APP_ID;/g" "$PBXPROJ"
          sed -i '' "s/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g" "$PBXPROJ"
          
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          # Create an explicit ExportOptions.plist to force strict signing compliance
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$APP_ID</key>
              <string>$PROFILE_UUID</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          EOF

          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist ExportOptions.plist \
            --archive-flags "DEVELOPMENT_TEAM=$TEAM_ID PROVISIONING_PROFILE=$PROFILE_UUID PROVISIONING_PROFILE_SPECIFIER=\"$PROFILE_NAME\" CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY=\"Apple Distribution\""
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tommyholm97@gmail.com
