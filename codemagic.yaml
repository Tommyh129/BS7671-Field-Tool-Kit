workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - app_store_credentials 
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.bs7671.fieldtoolkit"
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Create Native Project & Fix Dependencies
        script: |
          set -e
          rm -rf ios
          echo "{\"appId\": \"$APP_ID\", \"appName\": \"App\", \"webDir\": \"dist\"}" > capacitor.config.json
          npx cap add ios || true
          if [ ! -d "ios" ]; then
            echo "ERROR: ios directory was not created."
            exit 1
          fi
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/g" ios/App/Podfile
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '15.0'/g" ios/App/Podfile
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' {} +
          cd ios/App && pod repo update && cd ../..
          npx cap sync ios || true
      - name: Set up Signing
        script: |
          set -e
          # 1. UPGRADE & PATH SETUP
          echo "--- Upgrading Codemagic CLI Tools ---"
          pip3 install --upgrade codemagic-cli-tools
          hash -r
          APP_STORE_CONNECT_BIN=$(dirname $(which python3))/app-store-connect
          echo "Using App Store Connect CLI at: $APP_STORE_CONNECT_BIN"
          $APP_STORE_CONNECT_BIN --version
          
          # 2. KEYCHAIN & AUTH
          echo "--- Initializing Keychain ---"
          keychain initialize
          
          echo "--- Verifying Environment Variables ---"
          export APP_STORE_CONNECT_PRIVATE_KEY=$(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | sed 's/\\n/\n/g')
          
          # Handle potential naming variation for Key ID
          if [ -z "$APP_STORE_CONNECT_KEY_ID" ] && [ -n "$APP_STORE_CONNECT_KEY_IDENTIFIER" ]; then
            echo "Note: Using APP_STORE_CONNECT_KEY_IDENTIFIER as APP_STORE_CONNECT_KEY_ID"
            export APP_STORE_CONNECT_KEY_ID="$APP_STORE_CONNECT_KEY_IDENTIFIER"
          fi
          
          MISSING_VARS=0
          for var in APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_PRIVATE_KEY; do
            if [ -z "${!var}" ]; then
              echo "ERROR: Environment variable $var is missing."
              MISSING_VARS=1
            fi
          done
          
          if [ $MISSING_VARS -eq 1 ]; then
            echo "CRITICAL: App Store Connect credentials are not set in the environment."
            echo "Please ensure the 'app_store_credentials' group in Codemagic contains:"
            echo "  - APP_STORE_CONNECT_ISSUER_ID"
            echo "  - APP_STORE_CONNECT_KEY_ID (or APP_STORE_CONNECT_KEY_IDENTIFIER)"
            echo "  - APP_STORE_CONNECT_PRIVATE_KEY"
            echo "Current environment (APP_STORE_CONNECT_*):"
            env | grep APP_STORE_CONNECT | cut -d= -f1 || true
            exit 1
          fi
          
          # 3. PORTAL CLEANUP (Fresh start)
          echo "--- Cleaning Old Distribution Certificates ---"
          for type in DISTRIBUTION IOS_DISTRIBUTION; do
            CERT_IDS=$($APP_STORE_CONNECT_BIN certificates list --type "$type" --json | python3 -c "import sys, json; data = json.load(sys.stdin); print('\n'.join([d['id'] for d in data]))" || echo "")
            for id in $CERT_IDS; do 
              echo "Deleting cert: $id"
              $APP_STORE_CONNECT_BIN certificates delete --id "$id" || true
            done
          done
          sleep 3
          
          # 4. ROBUST CERTIFICATE CREATION VIA API (Bypass CLI bugs)
          echo "--- Generating CSR & Private Key ---"
          openssl genrsa -out /tmp/key.pem 2048
          openssl req -new -key /tmp/key.pem -out /tmp/cert.csr -subj "/CN=Apple Distribution: BS7671/O=FieldToolkit"
          
          echo "--- Uploading CSR to Apple (Direct API Flow) ---"
          python3 - <<EOF
          import os, sys, json, time, jwt, requests, base64
          
          def create_cert():
              try:
                  # 1. Config
                  issuer_id = os.environ.get('APP_STORE_CONNECT_ISSUER_ID')
                  key_id = os.environ.get('APP_STORE_CONNECT_KEY_ID') or os.environ.get('APP_STORE_CONNECT_KEY_IDENTIFIER')
                  private_key_raw = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY', '')
                  private_key = private_key_raw.replace('\\n', '\n')
                  
                  if not issuer_id or not key_id or not private_key:
                      print(f"ERROR: Missing environment variables.")
                      sys.exit(1)
                  
                  # 2. Generate JWT
                  header = {'alg': 'ES256', 'kid': str(key_id), 'typ': 'JWT'}
                  payload = {
                      'iss': issuer_id,
                      'exp': int(time.time()) + 1200,
                      'aud': 'appstoreconnect-v1'
                  }
                  token = jwt.encode(payload, private_key, algorithm='ES256', headers=header)
                  
                  # 3. Prepare CSR
                  with open('/tmp/cert.csr', 'r') as f:
                      csr_lines = f.readlines()
                  csr_content = "".join([line.strip() for line in csr_lines if "CERTIFICATE REQUEST" not in line])
                  
                  # 4. POST to Apple
                  url = "https://api.appstoreconnect.apple.com/v1/certificates"
                  headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
                  data = {
                      "data": {
                          "type": "certificates",
                          "attributes": {
                              "certificateType": "DISTRIBUTION",
                              "csrContent": csr_content
                          }
                      }
                  }
                  
                  print(f"POSTing to {url}...")
                  resp = requests.post(url, headers=headers, json=data)
                  if resp.status_code != 201:
                      print(f"ERROR: Apple API returned {resp.status_code}")
                      print(resp.text)
                      sys.exit(1)
                  
                  res_data = resp.json()
                  cert_id = res_data['data']['id']
                  cert_content_b64 = res_data['data']['attributes']['certificateContent']
                  
                  # 5. Save outputs
                  with open('/tmp/cert.id', 'w') as f: f.write(cert_id)
                  with open('/tmp/cert.cer', 'wb') as f: f.write(base64.b64decode(cert_content_b64))
                  print(f"SUCCESS: Created certificate {cert_id}")
              except Exception as e:
                  print(f"EXCEPTION: {str(e)}")
                  sys.exit(1)
          
          if __name__ == "__main__":
              create_cert()
          EOF
          
          CERT_ID=$(cat /tmp/cert.id)
          
          echo "--- Packaging P12 Bundle ---"
          openssl x509 -inform DER -in /tmp/cert.cer -out /tmp/cert.pem
          openssl pkcs12 -export -out /tmp/cert.p12 -inkey /tmp/key.pem -in /tmp/cert.pem -password pass:codemagic -name "Apple Distribution"
          
          echo "--- Importing P12 into Keychain ---"
          keychain add-certificates --p12 /tmp/cert.p12 --p12-password codemagic
          
          # 5. FETCH & AUTO-REPAIR PROFILES
          echo "--- Fetching & Updating Provisioning Profiles ---"
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          rm -rf "$PROFILES_DIR"
          mkdir -p "$PROFILES_DIR"
          $APP_STORE_CONNECT_BIN fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --profiles-dir "$PROFILES_DIR" \
            --create
          
          # 6. EXTRACT SIGNING DETAILS
          PROFILE_PATH=$(find "$PROFILES_DIR" -name "*.mobileprovision" | head -1)
          if [ -z "$PROFILE_PATH" ]; then
             echo "ERROR: Signing profile fetch failed."
             exit 1
          fi
          
          export TEAM_ID=$(grep -aA1 "TeamIdentifier" "$PROFILE_PATH" | grep "<string>" | sed -e 's/<string>//' -e 's/<\/string>//' | head -1 | xargs)
          export PROFILE_NAME=$(grep -aA1 "Name" "$PROFILE_PATH" -A1 | grep "<string>" | head -1 | sed -e 's/<string>//' -e 's/<\/string>//' | xargs)
          export PROFILE_UUID=$(grep -aA1 "UUID" "$PROFILE_PATH" -A1 | grep "<string>" | head -1 | sed -e 's/<string>//' -e 's/<\/string>//' | xargs)
          
          echo "TEAM_ID=$TEAM_ID" >> $CM_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $CM_ENV
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV
          
          # 7. XCODE SYNC
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' "s/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g" {} +
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "DEVELOPMENT_TEAM=$TEAM_ID PROVISIONING_PROFILE=$PROFILE_UUID PROVISIONING_PROFILE_SPECIFIER=\"$PROFILE_NAME\" CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY=\"Apple Distribution\""
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tommyholm97@gmail.com
