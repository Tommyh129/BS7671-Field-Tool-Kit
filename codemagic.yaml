workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace" # Changed back to workspace for CocoaPods
        XCODE_SCHEME: "App"
        APP_ID: "com.bs7671.fieldtoolkit"
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Re-create iOS folder with CocoaPods
        script: |
          # We delete the folder and re-add it to ensure it uses CocoaPods, not SPM
          rm -rf ios
          npx cap add ios
          
          # This forces Capacitor to generate a Podfile instead of using SPM
          npx cap sync ios
      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files "$APP_ID" --create
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tommyholm97@gmail.com
