workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - app_store_credentials # Double-check this matches your Group name in Codemagic Settings
      vars:
        TEAM_ID: "G5937UH83P" 
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.bs7671.fieldtoolkit"
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Create Native Project & Fix Dependencies
        script: |
          # 1. Start fresh
          rm -rf ios
          echo "{\"appId\": \"$APP_ID\", \"appName\": \"App\", \"webDir\": \"dist\"}" > capacitor.config.json
          
          # 2. Add ios platform and fix version for capacitor-plugin-purchase (must be 15.0)
          npx cap add ios || true
          
          # Fix Podfile and Project version for deployment targets
          find ios -name "Podfile" -exec sed -i '' "s/platform :ios, '1[0-4]\.[0-9]'/platform :ios, '15.0'/g" {} +
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' {} +
          
          npx cap sync ios
      - name: Set up Signing
        script: |
          # 1. NORMALIZE PRIVATE KEY (Fixing formatting issues)
          export APP_STORE_CONNECT_PRIVATE_KEY=$(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | sed 's/\\n/\n/g')
          
          # 2. MANUAL KEYCHAIN SETUP (Bypassing CLI wrappers)
          # We create a specific keychain called 'build.keychain' with password 'cm'
          echo "--- Setting up Manual Keychain ---"
          security create-keychain -p cm build.keychain
          security list-keychains -d user -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p cm build.keychain
          # Ensure apps can access items without popups
          security set-keychain-settings -t 3600 -u build.keychain
          
          # 3. VERIFY ACCOUNT ACCESS
          echo "--- Verifying Apple Account Access ---"
          app-store-connect apps list | grep "$APP_ID" || (echo "ERROR: App ID $APP_ID not found. Check Role."; exit 1)

          # 4. FETCH AND CREATE SIGNING FILES
          # We use --create to tell it to make the cert if it doesn't exist.
          # The unlocked 'build.keychain' will now accept the private key.
          echo "--- Fetching/Creating signing files ---"
          app-store-connect fetch-signing-files "$APP_ID" --type IOS_APP_STORE --create
          
          # 5. Extract Profile Details
          PROFILE_PATH=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name "*.mobileprovision" | head -1)
          if [ -z "$PROFILE_PATH" ]; then
             echo "ERROR: No profile found. Check your API Key Role and Agreements at developer.apple.com."
             exit 1
          fi

          export PROFILE_NAME=$(grep -aA1 "Name" "$PROFILE_PATH" -A1 | grep "<string>" | head -1 | sed -e 's/<string>//' -e 's/<\/string>//' | xargs)
          export PROFILE_UUID=$(grep -aA1 "UUID" "$PROFILE_PATH" -A1 | grep "<string>" | head -1 | sed -e 's/<string>//' -e 's/<\/string>//' | xargs)
          
          echo "PROFILE_NAME=$PROFILE_NAME" >> $CM_ENV
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV
          
          echo "Using Profile: $PROFILE_NAME ($PROFILE_UUID)"
          
          # 6. Apply manual signing configuration
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' "s/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g" {} +
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "DEVELOPMENT_TEAM=$TEAM_ID PROVISIONING_PROFILE=$PROFILE_UUID PROVISIONING_PROFILE_SPECIFIER=\"$PROFILE_NAME\" CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY=\"Apple Distribution\""
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tommyholm97@gmail.com
