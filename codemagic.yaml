workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - app_store_credentials # Double-check this group name in Codemagic Settings
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.bs7671.fieldtoolkit"
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Create Native Project & Fix Dependencies
        script: |
          # 1. Start fresh
          rm -rf ios
          echo "{\"appId\": \"$APP_ID\", \"appName\": \"App\", \"webDir\": \"dist\"}" > capacitor.config.json
          
          # 2. Add ios platform 
          npx cap add ios || true
          
          if [ ! -d "ios" ]; then
            echo "ERROR: ios directory was not created. Check your capacitor.config.json."
            exit 1
          fi

          # 3. Fix Deployment Target IMMEDIATELY
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/g" ios/App/Podfile
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '15.0'/g" ios/App/Podfile
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' {} +
          
          # 4. Sync native project with RETRIES
          # Sometimes GitHub or the Ionic CDN returns a 504. We retry up to 3 times.
          cd ios/App && pod repo update && cd ../..
          
          MAX_RETRIES=3
          COUNT=0
          SUCCESS=false
          while [ $COUNT -lt $MAX_RETRIES ]; do
            COUNT=$((COUNT+1))
            echo "Attempting Capacitor Sync (Attempt $COUNT of $MAX_RETRIES)..."
            if npx cap sync ios; then
              SUCCESS=true
              break
            else
              echo "Sync failed. Waiting 15 seconds before retry..."
              sleep 15
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "ERROR: Capacitor sync failed after $MAX_RETRIES attempts."
            exit 1
          fi
      - name: Set up Signing
        script: |
          # 1. NORMALIZE PRIVATE KEY
          export APP_STORE_CONNECT_PRIVATE_KEY=$(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | sed 's/\\n/\n/g')
          
          # 2. CLEANUP LOCAL STATE
          rm -rf "$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          
          # 3. MANUAL KEYCHAIN SETUP (Native macOS setup)
          echo "--- Setting up Manual Keychain ---"
          security create-keychain -p codemagic build.keychain
          security list-keychains -d user -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p codemagic build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          
          # 4. NUCLEAR CLEANUP (The fix for "Cannot save... without private key")
          echo "--- Searching and Deleting Existing Certificates ---"
          for type in DISTRIBUTION IOS_DISTRIBUTION; do
            echo "Checking type: $type"
            CERT_IDS=$(app-store-connect certificates list --type "$type" --json | grep -o '"id": "[^"]*"' | cut -d'"' -f4)
            for id in $CERT_IDS; do
              echo "Deleting existing certificate: $id"
              app-store-connect certificates delete --id "$id" || echo "Failed to delete cert $id"
            done
          done

          # 5. FETCH/CREATE SIGNING FILES
          echo "--- Fetching/Creating signing files ---"
          app-store-connect fetch-signing-files "$APP_ID" --type IOS_APP_STORE --create
          
          # 6. Extract Profile Details
          PROFILE_PATH=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name "*.mobileprovision" | head -1)
          if [ -z "$PROFILE_PATH" ]; then
             echo "ERROR: Fetch failed. This usually means your API Key is missing the 'Access to Certificates' checkbox in App Store Connect."
             exit 1
          fi

          export TEAM_ID=$(grep -aA1 "TeamIdentifier" "$PROFILE_PATH" | grep "<string>" | sed -e 's/<string>//' -e 's/<\/string>//' | head -1 | xargs)
          export PROFILE_NAME=$(grep -aA1 "Name" "$PROFILE_PATH" -A1 | grep "<string>" | head -1 | sed -e 's/<string>//' -e 's/<\/string>//' | xargs)
          export PROFILE_UUID=$(grep -aA1 "UUID" "$PROFILE_PATH" -A1 | grep "<string>" | head -1 | sed -e 's/<string>//' -e 's/<\/string>//' | xargs)
          
          echo "TEAM_ID=$TEAM_ID" >> $CM_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $CM_ENV
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV
          
          echo "Using Team: $TEAM_ID, Profile: $PROFILE_NAME ($PROFILE_UUID)"
          
          # 7. Apply manual signing configuration
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' "s/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g" {} +
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "DEVELOPMENT_TEAM=$TEAM_ID PROVISIONING_PROFILE=$PROFILE_UUID PROVISIONING_PROFILE_SPECIFIER=\"$PROFILE_NAME\" CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY=\"Apple Distribution\""
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tommyholm97@gmail.com
