workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.bs7671.fieldtoolkit"
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Re-create iOS folder and Inject Signing
        script: |
          # 1. Start fresh
          rm -rf ios
          npx cap add ios || true
          
          # 2. Force deployment target to 15.0 for plugin compatibility
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/g" ios/App/Podfile
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '15.0'/g" ios/App/Podfile
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' {} +
          
          npx cap sync ios
          
          # 3. FETCH SIGNING FILES (We do this early to extract the Team ID)
          app-store-connect fetch-signing-files "$APP_ID" --create
          
          # 4. DOWNLOAD THE TEAM ID FROM THE PROFILE
          # This finds your Apple Team ID (e.g., ABC123XYZ) from the profile we just downloaded
          export TEAM_ID=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" -exec grep -aA1 "TeamIdentifier" {} + | grep "<string>" | sed -e 's/<string>//' -e 's/<\/string>//' | head -1 | xargs)
          echo "Extracted Team ID: $TEAM_ID"
          
          # 5. FORCE SETTINGS INTO XCODE
          # Force Manual Signing, Set the extracted Team ID, and set the Bundle ID
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' {} +
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' "s/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = $TEAM_ID;/g" {} +
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = $APP_ID;/g" {} +
          
          # 6. Final apply
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tommyholm97@gmail.com
