workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_ID: "com.bs7671.fieldtoolkit"
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Capacitor sync
        script: |
          npx cap copy ios
          npx cap sync ios
      - name: Set up code signing
        script: |
          # Fetch your certificates from Apple
          app-store-connect fetch-signing-files "$APP_ID" --create
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          # This command builds the app using the project file directly
          # We add a small timeout/retry to ensure build settings are loaded
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -showBuildSettings || true
          
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tommyholm97@gmail.com
