workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - app_store_credentials # Ensure this matches your Environment Group name in Codemagic
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.bs7671.fieldtoolkit"
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Create Native Project & Fix Dependencies
        script: |
          # 1. Start fresh
          rm -rf ios
          echo "{\"appId\": \"$APP_ID\", \"appName\": \"App\", \"webDir\": \"dist\"}" > capacitor.config.json
          
          # 2. Add ios platform
          npx cap add ios || true
          
          if [ ! -d "ios" ]; then
            echo "ERROR: ios directory was not created. Check your capacitor.config.json."
            exit 1
          fi

          # 3. Fix Deployment Target for capacitor-plugin-purchase compatibility
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/g" ios/App/Podfile
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '15.0'/g" ios/App/Podfile
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' {} +
          
          # 4. Sync native project
          npx cap sync ios
      - name: Set up Signing
        script: |
          # 1. Initialize Keychain
          keychain initialize
          
          # 2. VERIFY API KEY ACCOUNT ACCESS
          echo "--- Checking Teams and Apps ---"
          # This confirms the API key is looking at the right team and can see your app.
          app-store-connect apps list | grep "$APP_ID" || (echo "ERROR: App ID $APP_ID not found. Your API Key might be for the wrong Team."; exit 1)

          # 3. CLEAR ALL GHOST CERTIFICATES (The "Surgical Clean")
          # We check both the modern and legacy distribution types to clear the slots.
          echo "--- Searching for all certificates to clear ---"
          for type in DISTRIBUTION IOS_DISTRIBUTION; do
            echo "Checking type: $type"
            IDS=$(app-store-connect certificates list --type "$type" --json | grep -o '"id": "[^"]*"' | cut -d'"' -f4)
            for cid in $IDS; do
              echo "Deleting Certificate ID: $cid"
              app-store-connect certificates delete --id "$cid" || echo "Failed to delete $cid"
            done
          done

          # 4. MANUALLY CREATE CERTIFICATE
          # Creating it manually with --save ensures the private key is generated and stored.
          echo "--- Creating fresh Distribution Certificate ---"
          app-store-connect certificates create --type DISTRIBUTION --save
          
          # 5. Fetch/Create Provisioning Profiles
          echo "--- Fetching/Creating signing files ---"
          app-store-connect fetch-signing-files "$APP_ID" --type IOS_APP_STORE --create
          
          # 6. Extract Details for the build step
          PROFILE_PATH=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name "*.mobileprovision" | head -1)
          if [ -z "$PROFILE_PATH" ]; then
             echo "ERROR: No provisioning profile was found. Please ensure your API Key is ADMIN."
             exit 1
          fi

          export TEAM_ID=$(grep -aA1 "TeamIdentifier" "$PROFILE_PATH" | grep "<string>" | sed -e 's/<string>//' -e 's/<\/string>//' | head -1 | xargs)
          export PROFILE_NAME=$(grep -aA1 "Name" "$PROFILE_PATH" -A1 | grep "<string>" | head -1 | sed -e 's/<string>//' -e 's/<\/string>//' | xargs)
          export PROFILE_UUID=$(grep -aA1 "UUID" "$PROFILE_PATH" -A1 | grep "<string>" | head -1 | sed -e 's/<string>//' -e 's/<\/string>//' | xargs)
          
          echo "TEAM_ID=$TEAM_ID" >> $CM_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $CM_ENV
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV
          
          echo "Using Team: $TEAM_ID, Profile: $PROFILE_NAME ($PROFILE_UUID)"
          
          # 7. Apply manual signing configuration to Xcode project
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' "s/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g" {} +
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          # Use the persisted environment variables in the build command
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "DEVELOPMENT_TEAM=$TEAM_ID PROVISIONING_PROFILE=$PROFILE_UUID PROVISIONING_PROFILE_SPECIFIER=\"$PROFILE_NAME\" CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY=\"Apple Distribution\""
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tommyholm97@gmail.com
