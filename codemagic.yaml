workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - app_store_credentials # Double-check this matches your Group name in Codemagic UI
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.bs7671.fieldtoolkit"
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Create Native Project & Fix Dependencies
        script: |
          # 1. Start fresh
          rm -rf ios
          echo "{\"appId\": \"$APP_ID\", \"appName\": \"App\", \"webDir\": \"dist\"}" > capacitor.config.json
          
          # 2. Add ios platform and fix version for capacitor-plugin-purchase (must be 15.0)
          npx cap add ios || true
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/g" ios/App/Podfile
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '15.0'/g" ios/App/Podfile
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' {} +
          
          npx cap sync ios
      - name: Set up Signing
        script: |
          # 1. Initialize Keychain 
          keychain initialize
          
          # 2. THE P12 INJECTION (The Fix)
          # We force create a certificate and save it to a local .p12 file first.
          # This bypasses the "Cannot save... without private key" error.
          echo "--- Creating fresh Distribution Certificate as P12 ---"
          app-store-connect certificates create \
            --type DISTRIBUTION \
            --p12-path "$(pwd)/signing.p12" \
            --p12-password "codemagic" \
            --save || echo "Creation failed. Account might still have a hidden ghost cert."

          # 3. Import the P12 we just made into the keychain
          if [ -f "$(pwd)/signing.p12" ]; then
            echo "--- Importing P12 into Keychain ---"
            keychain add-certificates --path "$(pwd)/signing.p12" --p12-password "codemagic"
          else
            echo "--- Warning: P12 generation failed. Falling back to fetch. ---"
          fi

          # 4. Fetch/Create Signing Files
          # Now that we have a P12 locally, fetch will match the key to the profile.
          app-store-connect fetch-signing-files "$APP_ID" --type IOS_APP_STORE --create
          
          # 5. Extract Profile Details
          PROFILE_PATH=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name "*.mobileprovision" | head -1)
          if [ -z "$PROFILE_PATH" ]; then
             echo "ERROR: Fetch failed. Check your API Key Role (must be Admin) and Portal agreements."
             exit 1
          fi

          export TEAM_ID=$(grep -aA1 "TeamIdentifier" "$PROFILE_PATH" | grep "<string>" | sed -e 's/<string>//' -e 's/<\/string>//' | head -1 | xargs)
          export PROFILE_NAME=$(grep -aA1 "Name" "$PROFILE_PATH" -A1 | grep "<string>" | head -1 | sed -e 's/<string>//' -e 's/<\/string>//' | xargs)
          export PROFILE_UUID=$(grep -aA1 "UUID" "$PROFILE_PATH" -A1 | grep "<string>" | head -1 | sed -e 's/<string>//' -e 's/<\/string>//' | xargs)
          
          echo "TEAM_ID=$TEAM_ID" >> $CM_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $CM_ENV
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV
          
          echo "Using Team: $TEAM_ID, Profile: $PROFILE_NAME ($PROFILE_UUID)"
          
          # 6. Apply manual signing configuration
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' "s/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g" {} +
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "DEVELOPMENT_TEAM=$TEAM_ID PROVISIONING_PROFILE=$PROFILE_UUID PROVISIONING_PROFILE_SPECIFIER=\"$PROFILE_NAME\" CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY=\"Apple Distribution\""
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tommyholm97@gmail.com
