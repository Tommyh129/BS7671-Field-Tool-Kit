workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - app_store_credentials 
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.bs7671.fieldtoolkit"
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Create Native Project & Fix Dependencies
        script: |
          set -e
          if [ ! -d "dist" ]; then
            echo "ERROR: 'dist' directory not found. Did the web build fail?"
            exit 1
          fi
          rm -rf ios
          echo "{\"appId\": \"$APP_ID\", \"appName\": \"App\", \"webDir\": \"dist\"}" > capacitor.config.json
          npx cap add ios || true
          if [ ! -d "ios" ]; then
            echo "ERROR: ios directory was not created."
            exit 1
          fi
          # Fix deployment targets and podfile compatibility
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/g" ios/App/Podfile
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '15.0'/g" ios/App/Podfile
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' {} +
          cd ios/App && pod repo update && cd ../..
          # Sync with retries for network stability
          npx cap sync ios || (sleep 10 && npx cap sync ios)
      - name: Set up Signing
        script: |
          set -e
          # 1. UPGRADE & PATH SETUP
          echo "--- Upgrading Codemagic CLI Tools ---"
          pip3 install --upgrade codemagic-cli-tools
          hash -r
          APP_STORE_CONNECT_BIN=$(dirname $(which python3))/app-store-connect
          keychain initialize
          
          # 2. AUTH & ENV VERIFICATION
          echo "--- Verifying Environment Variables ---"
          export APP_STORE_CONNECT_PRIVATE_KEY=$(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | sed 's/\\n/\n/g')
          
          if [ -z "$APP_STORE_CONNECT_KEY_ID" ] && [ -n "$APP_STORE_CONNECT_KEY_IDENTIFIER" ]; then
            export APP_STORE_CONNECT_KEY_ID="$APP_STORE_CONNECT_KEY_IDENTIFIER"
          fi
          
          MISSING_VARS=0
          for var in APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_PRIVATE_KEY; do
            if [ -z "${!var}" ]; then
              echo "ERROR: Environment variable $var is missing."
              MISSING_VARS=1
            fi
          done
          
          if [ $MISSING_VARS -eq 1 ]; then
            echo "CRITICAL: App Store Connect credentials are missing."
            exit 1
          fi
          
          # 3. PORTAL CLEANUP
          echo "--- Cleaning Old Distribution Certificates ---"
          for type in DISTRIBUTION IOS_DISTRIBUTION; do
            CERT_IDS=$($APP_STORE_CONNECT_BIN certificates list --type "$type" --json | python3 -c "import sys, json; data = json.load(sys.stdin); print('\n'.join([d['id'] for d in data]))" || echo "")
            for id in $CERT_IDS; do 
              echo "Deleting cert: $id"
              $APP_STORE_CONNECT_BIN certificates delete --certificate-id "$id" || true
            done
          done
          sleep 3
          
          # 4. CERTIFICATE CREATION (API BYPASS)
          echo "--- Generating CSR & Private Key ---"
          openssl genrsa -out /tmp/key.pem 2048
          openssl req -new -key /tmp/key.pem -out /tmp/cert.csr -subj "/CN=Apple Distribution: BS7671/O=FieldToolkit"
          
          python3 - <<EOF
          import os, sys, json, time, jwt, requests, base64
          def create_cert():
              try:
                  issuer_id = os.environ.get('APP_STORE_CONNECT_ISSUER_ID')
                  key_id = os.environ.get('APP_STORE_CONNECT_KEY_ID')
                  private_key = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY', '').replace('\\n', '\n')
                  
                  header = {'alg': 'ES256', 'kid': str(key_id), 'typ': 'JWT'}
                  payload = {'iss': issuer_id, 'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'}
                  token = jwt.encode(payload, private_key, algorithm='ES256', headers=header)
                  
                  with open('/tmp/cert.csr', 'r') as f:
                      csr_content = "".join([line.strip() for line in f.readlines() if "CERTIFICATE REQUEST" not in line])
                  
                  resp = requests.post("https://api.appstoreconnect.apple.com/v1/certificates", 
                      headers={"Authorization": f"Bearer {token}"}, 
                      json={"data": {"type": "certificates", "attributes": {"certificateType": "DISTRIBUTION", "csrContent": csr_content}}})
                  
                  if resp.status_code != 201: sys.exit(1)
                  res = resp.json()
                  with open('/tmp/cert.id', 'w') as f: f.write(res['data']['id'])
                  with open('/tmp/cert.cer', 'wb') as f: f.write(base64.b64decode(res['data']['attributes']['certificateContent']))
              except Exception as e: sys.exit(1)
          create_cert()
          EOF
          
          echo "--- Importing into Keychain ---"
          openssl x509 -inform DER -in /tmp/cert.cer -out /tmp/cert.pem
          openssl pkcs12 -export -out /tmp/cert.p12 -inkey /tmp/key.pem -in /tmp/cert.pem -password pass:codemagic -name "Apple Distribution"
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password codemagic
          
          # 5. FETCH PROFILES
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          $APP_STORE_CONNECT_BIN fetch-signing-files "$APP_ID" --type IOS_APP_STORE --profiles-dir "$PROFILES_DIR" --create
          
          # 6. EXTRACT SIGNING DETAILS & PATCH PROJECT
          PROFILE_PATH=$(find "$PROFILES_DIR" -name "*.mobileprovision" | head -1)
          export TEAM_ID=$(grep -aA1 "TeamIdentifier" "$PROFILE_PATH" | grep -o "<string>[^<]*" | sed 's/<string>//' | head -1 | xargs)
          export PROFILE_NAME=$(grep -aA1 "Name" "$PROFILE_PATH" | grep -o "<string>[^<]*" | sed 's/<string>//' | head -1 | xargs)
          export PROFILE_UUID=$(grep -aA1 "UUID" "$PROFILE_PATH" | grep -o "<string>[^<]*" | sed 's/<string>//' | head -1 | xargs)
          
          echo "TEAM_ID=$TEAM_ID" >> $CM_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $CM_ENV
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV
          
          echo "--- Syncing Xcode Project with Team: $TEAM_ID ---"
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' "s/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = $TEAM_ID;/g" {} +
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = $APP_ID;/g" {} +
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' "s/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g" {} +
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "DEVELOPMENT_TEAM=$TEAM_ID PROVISIONING_PROFILE=$PROFILE_UUID PROVISIONING_PROFILE_SPECIFIER=\"$PROFILE_NAME\" CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY=\"Apple Distribution\""
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tommyholm97@gmail.com
